# Standalone TrainerConfig for testing per-segment backward OOM fix
# Uses existing rollout data from balrog-babyai-good step_0 and step_1

max_steps = 2
output_dir = "/network/scratch/e/emiliano.penaloza/outputs/balrog-babyai-good"
dist_timeout_seconds = 3600
compact_target_ratio = 0.25
compaction_mode = "attention_matching"
use_suffix_queries = true

[log]
level = "debug"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"
seq_len = 6000
impl = "auto"
optim_cpu_offload = true

[model.ac]
freq = 1

[optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[loss]
type = "default"

[ckpt]
interval = 100
resume_step = -1
