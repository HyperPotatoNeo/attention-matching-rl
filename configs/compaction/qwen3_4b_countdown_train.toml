max_steps = 5
seq_len = 4096
output_dir = "outputs/compaction-countdown-train"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "compaction-rl"
name = "compaction-countdown-train-test"

[deployment]
num_train_gpus = 1
num_infer_gpus = 3

[trainer]
compact_target_ratio = 0.25
compact_window = 512

[trainer.model]
impl = "auto"

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64

[trainer.optim]
lr = 1e-5

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 16
rollouts_per_example = 4

[orchestrator.sampling]
max_tokens = 2048

[[orchestrator.env]]
id = "compaction_env"
name = "compaction-rg-mix"
args = { gym = "rg_mix_env", max_seq_len = 2048, compact_target_ratio = 0.25, compact_window = 512, n_compacts = 2, num_train_examples = 100, num_eval_examples = 10 }

[inference]
gpu_memory_utilization = 0.85

[inference.model]
enforce_eager = true

[inference.parallel]
tp = 1

[inference.vllm_extra]
enable_compaction = true
