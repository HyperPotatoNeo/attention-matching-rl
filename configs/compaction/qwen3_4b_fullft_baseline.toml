# Baseline Full FT Training — No Compaction (4-4 config)
# 2-node: Node 1 = 4 inference (TP=1), Node 2 = 4 trainer (FSDP2)
# Same rg-mix env, same hyperparams as compaction run, but standard generation.
#
# __INFERENCE_NODE__ is replaced by the launch script.

max_steps = 600
seq_len = 9216
output_dir = "outputs/rg-mix-baseline"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "compaction-rl"
name = "rg-mix-baseline"

[ckpt]
interval = 50
resume_step = -1

[deployment]
num_train_gpus = 4
num_infer_gpus = 0

[trainer]
dist_timeout_seconds = 3600

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 256
rollouts_per_example = 8

# 4 inference servers on Node 1
[orchestrator.client]
base_url = [
    "http://__INFERENCE_NODE__:8000/v1",
    "http://__INFERENCE_NODE__:8001/v1",
    "http://__INFERENCE_NODE__:8002/v1",
    "http://__INFERENCE_NODE__:8003/v1",
]

[orchestrator.sampling]
max_tokens = 8192

[[orchestrator.env]]
id = "rg_mix_env"
name = "rg-mix-baseline"
args = { dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
