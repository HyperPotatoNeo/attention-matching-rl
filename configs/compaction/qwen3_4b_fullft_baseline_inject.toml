# Baseline Full FT + Budget Injection (no compaction)
# 2-node: Node 1 = 4 inference (TP=1, compaction server), Node 2 = 4 trainer (FSDP2)
# Uses /inject_generate endpoint for periodic budget injection without KV compaction.
#
# __INFERENCE_NODE__ is replaced by the launch script.

max_steps = 600
seq_len = 9216
output_dir = "outputs/rg-mix-baseline-inject"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "compaction-rl"
name = "rg-mix-baseline-inject"

[ckpt]
interval = 30

[deployment]
num_train_gpus = 4
num_infer_gpus = 0

[trainer]
dist_timeout_seconds = 3600

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 256
rollouts_per_example = 8

# 4 inference servers on Node 1 (compaction server for /inject_generate)
[orchestrator.client]
base_url = [
    "http://__INFERENCE_NODE__:8000/v1",
    "http://__INFERENCE_NODE__:8001/v1",
    "http://__INFERENCE_NODE__:8002/v1",
    "http://__INFERENCE_NODE__:8003/v1",
]

[orchestrator.sampling]
max_tokens = 8192

[[orchestrator.env]]
id = "compaction_env"
name = "baseline-inject"
args = { gym = "rg_mix_env", inject_only = true, inject_budget_every = 2048, max_total_tokens = 8192, max_seq_len = 9216, dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
