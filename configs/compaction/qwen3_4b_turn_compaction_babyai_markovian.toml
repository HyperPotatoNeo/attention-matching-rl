# BabyAI — Qwen3-4B-Instruct, Turn-Based Markovian Compaction (KV-budget mode)
# Single node: 2 GPU inference (DP=2, TP=1), 2 GPUs training (FSDP2)
# KV-budget: fires when current_seq_len >= max_kv_len (every turn after the first)

max_steps = 600
seq_len = 6000
output_dir = "/mnt/adea/data_rw/finetuning/emilianopp/experiments/rebuttal/markovian"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "balrog-rl-good"
name = "balrog-babyai-turn-markovian-full"

[trainer.wandb]
id = "babyai-turn-markovian-trainer-full1"

[orchestrator.wandb]
id = "babyai-turn-markovian-orch1"

[ckpt]
interval = 5
resume_step = -1

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[inference]
gpu_memory_utilization = 0.95

[inference.model]
enforce_eager = true
max_model_len = 16384

[inference.vllm_extra]
enable_compaction = true

[trainer]
dist_timeout_seconds = 3600
compact_target_ratio = 0.25
compaction_mode = "markovian"

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 64
rollouts_per_example = 4
max_inflight_rollouts = 64


[orchestrator.client]
base_url = ["http://localhost:8000/v1"]

[orchestrator.sampling]
max_tokens = 512
temperature = 1.0

[[orchestrator.env]]
id = "turn_compaction_env"
name = "balrog-babyai-turn-markovian"
args = { gym = "balrog-bench", max_kv_len = 3000, max_response_tokens = 512, compact_target_ratio = 0.25, n_max_turns = 4, n_preserved_turns = 2, max_turns = 30, compaction_mode = "markovian", environments = ["babyai"], max_text_history = 16 }

[orchestrator.eval]
interval = 5
num_examples = 50
rollouts_per_example = 1

[orchestrator.eval.sampling]
temperature = 1.0
max_tokens = 512

[[orchestrator.eval.env]]
id = "turn_compaction_env"
name = "balrog-babyai-turn-markovian-eval"
args = { gym = "balrog-bench", max_kv_len = 3000, max_response_tokens = 512, compact_target_ratio = 0.25, n_max_turns = 4, n_preserved_turns = 3, max_turns = 30, compaction_mode = "markovian", environments = ["babyai"], max_text_history = 16 }
