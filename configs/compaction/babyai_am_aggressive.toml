# BabyAI — Attention Matching, n_max_turns=3, n_preserved_turns=1
# Compacts every 3 turns, preserves only the most recent turn.
# More aggressive: compacts more often and retains less context.
# Single node: 2 GPU inference (DP=2, TP=1), 2 GPUs training (FSDP2)

max_steps = 600
seq_len = 6000
output_dir = "../scratch/outputs/babyai-am-3t1p"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "balrog-rl"
name = "babyai-am-3t1p"

[trainer.wandb]
id = "babyai-am-3t1p-trainer"

[orchestrator.wandb]
id = "babyai-am-3t1p-orch"

[ckpt]
interval = 10
resume_step = -1

[deployment]
num_train_gpus = 2
num_infer_gpus = 2

[inference]
gpu_memory_utilization = 0.85

[inference.model]
enforce_eager = true
max_model_len = 16384

[inference.vllm_extra]
enable_compaction = true

[trainer]
dist_timeout_seconds = 3600
compact_target_ratio = 0.25
compaction_mode = "attention_matching"
use_suffix_queries = true

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 64
rollouts_per_example = 4
max_inflight_rollouts = 16

[orchestrator.client]
base_url = ["http://localhost:8000/v1"]

[orchestrator.sampling]
max_tokens = 512
temperature = 1.0

[[orchestrator.env]]
id = "turn_compaction_env"
name = "babyai-am-3t1p"
args = { gym = "balrog-bench", max_kv_len = 3000, max_response_tokens = 512, compact_target_ratio = 0.25, n_max_turns = 3, n_preserved_turns = 1, max_turns = 30, compaction_mode = "attention_matching", use_suffix_queries = true, environments = ["babyai"], max_text_history = 16 }

[orchestrator.eval]
interval = 10
num_examples = 50
rollouts_per_example = 1

[orchestrator.eval.sampling]
temperature = 1.0
max_tokens = 512

[[orchestrator.eval.env]]
id = "turn_compaction_env"
name = "babyai-am-3t1p-eval"
args = { gym = "balrog-bench", max_kv_len = 3000, max_response_tokens = 512, compact_target_ratio = 0.25, n_max_turns = 3, n_preserved_turns = 1, max_turns = 30, compaction_mode = "attention_matching", use_suffix_queries = true, environments = ["babyai"], max_text_history = 16 }
