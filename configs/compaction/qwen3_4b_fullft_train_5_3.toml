# Compaction Full FT Training — Multi-Node Config (5 inference + 3 trainer GPUs)
#
# Architecture:
#   Node 1 (4 GPUs): 4 inference servers (TP=1, ports 8000-8003)
#   Node 2 (4 GPUs): 1 inference server (GPU 0, port 8004) + trainer (GPUs 1-3, FSDP2)
#
# __INFERENCE_NODE__ and __TRAINER_NODE__ are replaced by the launch script.

max_steps = 600
seq_len = 9216
output_dir = "outputs/compaction-fullft-multinode-5x3-test"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "compaction-rl"
name = "compaction-fullft-multinode"

[ckpt]
interval = 50
resume_step = -1

[deployment]
num_train_gpus = 3
num_infer_gpus = 0

[trainer]
dist_timeout_seconds = 3600
compact_target_ratio = 0.25
compact_window = 1024

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 256
rollouts_per_example = 8

# 5 inference servers: 4 on Node 1 + 1 on Node 2
[orchestrator.client]
base_url = [
    "http://__INFERENCE_NODE__:8000/v1",
    "http://__INFERENCE_NODE__:8001/v1",
    "http://__INFERENCE_NODE__:8002/v1",
    "http://__INFERENCE_NODE__:8003/v1",
    "http://__TRAINER_NODE__:8004/v1",
]

[orchestrator.sampling]
max_tokens = 8192

[[orchestrator.env]]
id = "compaction_env"
name = "compaction-rg-mix"
args = { gym = "rg_mix_env", max_seq_len = 9216, max_kv_len = 2048, max_total_tokens = 8192, compact_target_ratio = 0.25, compact_window = 1024, n_compacts = 99, dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
