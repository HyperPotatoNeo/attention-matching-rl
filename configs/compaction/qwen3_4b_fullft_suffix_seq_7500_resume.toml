# Compaction Full FT — Suffix Queries, 1024->32 compression, 7500 total tokens
# 2-node: Node 1 = 4 inference (TP=1), Node 2 = 4 trainer (FSDP2)
#
# RESUME config — continues from latest checkpoint with same W&B runs
# __INFERENCE_NODE__ is replaced by the launch script.

max_steps = 600
seq_len = 9216
output_dir = "outputs/suffix_seq_7500"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "compaction-rl"
name = "suffix_seq_7500"

[ckpt]
interval = 10
resume_step = 330

[deployment]
num_train_gpus = 4
num_infer_gpus = 0

[trainer]
dist_timeout_seconds = 3600
compact_target_ratio = 0.03125
compact_window = 1024
use_suffix_queries = true

[trainer.wandb]
id = "kuffhcey"

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 256
rollouts_per_example = 8

[orchestrator.wandb]
id = "hv29qr7r"

# 4 inference servers on Node 1
[orchestrator.client]
base_url = [
    "http://__INFERENCE_NODE__:8000/v1",
    "http://__INFERENCE_NODE__:8001/v1",
    "http://__INFERENCE_NODE__:8002/v1",
    "http://__INFERENCE_NODE__:8003/v1",
]

[orchestrator.sampling]
max_tokens = 7500

[[orchestrator.env]]
id = "compaction_env"
name = "compaction-rg-mix"
args = { gym = "rg_mix_env", max_seq_len = 9216, max_kv_len = 2048, max_total_tokens = 7500, compact_target_ratio = 0.03125, compact_window = 1024, n_compacts = 99, use_suffix_queries = true, dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
