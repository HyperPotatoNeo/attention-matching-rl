max_steps = 100
seq_len = 4096
output_dir = "outputs/compaction-countdown"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "compaction-rl"
name = "compaction-countdown"

[ckpt]
interval = 25

[trainer.model]
impl = "auto"

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64

[trainer.optim]
lr = 1e-5

[trainer.loss]
type = "grpo"

[orchestrator]
batch_size = 64
rollouts_per_example = 8

[orchestrator.sampling]
max_tokens = 2048

[[orchestrator.env]]
id = "compaction_env"
name = "compaction-countdown"
args = { gym = "countdown", max_seq_len = 2048, compact_target_ratio = 0.3, n_compacts = 1 }

[inference]
gpu_memory_utilization = 0.85
enforce_eager = true
tensor_parallel_size = 4

[inference.vllm_extra]
enable_compaction = true
